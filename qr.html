<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR — A Letter For You</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Dancing+Script:wght@600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg-deep: #050b1f;
            --bg-mid: #0a1535;
            --bg-soft: #142555;
            --gold: #d8b35a;
            --gold-soft: #f3d98a;
            --paper: #f6efe1;
            --ink: #1b3268;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { min-height: 100%; }
        body {
            font-family: "Inter", system-ui, sans-serif;
            background: radial-gradient(ellipse at 50% 10%, var(--bg-soft) 0%, var(--bg-mid) 35%, var(--bg-deep) 80%);
            color: var(--paper);
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 2.5rem 1.25rem;
            -webkit-font-smoothing: antialiased;
        }
        .wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.6rem;
        }
        .eyebrow {
            font-family: "Cormorant Garamond", serif;
            font-style: italic;
            color: var(--gold-soft);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            font-size: 0.8rem;
        }
        h1 {
            font-family: "Cormorant Garamond", serif;
            font-weight: 600;
            font-size: clamp(1.8rem, 5vw, 2.6rem);
            color: var(--paper);
            text-align: center;
            line-height: 1.2;
        }
        h1 .accent {
            font-family: "Dancing Script", cursive;
            color: var(--gold-soft);
            font-size: 1.2em;
        }
        .card {
            background: var(--paper);
            padding: 1.6rem;
            border-radius: 18px;
            box-shadow:
                0 30px 60px rgba(0, 0, 0, 0.45),
                0 0 0 1px rgba(216, 179, 90, 0.25);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }
        #qr {
            background: white;
            padding: 12px;
            border-radius: 8px;
            line-height: 0;
        }
        #qr svg {
            width: clamp(240px, 60vw, 360px);
            height: auto;
            display: block;
        }
        .url {
            color: var(--ink);
            font-family: ui-monospace, "SFMono-Regular", monospace;
            font-size: 0.8rem;
            word-break: break-all;
            text-align: center;
            max-width: 320px;
        }
        .actions {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        button, a.btn {
            appearance: none;
            background: transparent;
            border: 1px solid rgba(216, 179, 90, 0.55);
            color: var(--gold-soft);
            padding: 0.55rem 1.2rem;
            border-radius: 999px;
            font-family: "Inter", sans-serif;
            font-size: 0.8rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s ease, transform 0.2s ease;
        }
        button:hover, a.btn:hover { background: rgba(216, 179, 90, 0.12); transform: translateY(-1px); }

        @media print {
            body {
                background: white !important;
                color: black !important;
            }
            .eyebrow, h1 { color: #1b3268 !important; }
            h1 .accent { color: #8a6d2b !important; }
            .actions { display: none; }
            .card { box-shadow: none; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <p class="eyebrow">scan with your phone</p>
        <h1>A letter for <span class="accent">you</span></h1>

        <div class="card">
            <div id="qr" aria-label="QR code"></div>
            <p class="url" id="urlText"></p>
        </div>

        <div class="actions">
            <button id="downloadPng">Download PNG</button>
            <button id="downloadSvg">Download SVG</button>
            <button onclick="window.print()">Print</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script>
        const URL_TARGET = "https://mild-grad-web.netlify.app/";

        document.getElementById("urlText").textContent = URL_TARGET;

        // typeNumber=0 (auto), errorCorrectionLevel="H" (highest -> survives camera blur and a logo overlay later)
        const qr = qrcode(0, "H");
        qr.addData(URL_TARGET);
        qr.make();

        const cellSize = 8;
        const margin = 2;
        const svgString = qr.createSvgTag({ scalable: true, cellSize, margin });
        document.getElementById("qr").innerHTML = svgString;

        // ---- Download helpers ----
        function downloadBlob(blob, filename) {
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            a.remove();
            setTimeout(() => URL.revokeObjectURL(a.href), 1000);
        }

        document.getElementById("downloadSvg").addEventListener("click", () => {
            const svg = document.querySelector("#qr svg").outerHTML;
            downloadBlob(new Blob([svg], { type: "image/svg+xml" }), "qr-mild-grad.svg");
        });

        document.getElementById("downloadPng").addEventListener("click", () => {
            const svgEl = document.querySelector("#qr svg");
            const xml = new XMLSerializer().serializeToString(svgEl);
            const svg64 = btoa(unescape(encodeURIComponent(xml)));
            const img = new Image();
            img.onload = () => {
                const out = 1024;
                const canvas = document.createElement("canvas");
                canvas.width = out;
                canvas.height = out;
                const ctx = canvas.getContext("2d");
                ctx.fillStyle = "#ffffff";
                ctx.fillRect(0, 0, out, out);
                ctx.drawImage(img, 0, 0, out, out);
                canvas.toBlob((blob) => downloadBlob(blob, "qr-mild-grad.png"), "image/png");
            };
            img.src = "data:image/svg+xml;base64," + svg64;
        });
    </script>
</body>
</html>
